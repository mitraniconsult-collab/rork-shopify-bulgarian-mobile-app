name: Build iOS Simulator App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Show available schemes
        run: |
          xcodebuild -project ios/ShopifyBulgarianMobileApp.xcodeproj -list

      - name: Build for simulator
        run: |
          xcodebuild \
            -project ios/ShopifyBulgarianMobileApp.xcodeproj \
            -scheme ShopifyBulgarianMobileApp \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_SUPPRESS_WARNINGS=YES \
            build

      - name: Package .app for Appetize
        run: |
          APP_PATH=$(find build/Build/Products -name "*.app" -not -path "*/Tests*" | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p /tmp/appetize
          cp -r "$APP_PATH" /tmp/appetize/
          cd /tmp/appetize
          zip -r "$GITHUB_WORKSPACE/HomeSector.zip" *.app
          echo "Zip contents:"
          unzip -l "$GITHUB_WORKSPACE/HomeSector.zip" | head -5

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HomeSector-Simulator
          path: HomeSector.zip
          retention-days: 7
