name: Build iOS Simulator App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build for simulator
        run: |
          xcodebuild \
            -project ios/ShopifyBulgarianMobileApp.xcodeproj \
            -scheme ShopifyBulgarianMobileApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            OTHER_SWIFT_FLAGS="-suppress-warnings" \
            build 2>&1 | grep -E "error:|warning:|Build succeeded|BUILD FAILED|FAILED" | tail -50

      - name: Full build output on failure
        if: failure()
        run: |
          xcodebuild \
            -project ios/ShopifyBulgarianMobileApp.xcodeproj \
            -scheme ShopifyBulgarianMobileApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build2 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            build 2>&1 | grep -E "error:" | head -30

      - name: Find and zip .app
        run: |
          APP_PATH=$(find build -name "*.app" -not -path "*/Tests*" | head -1)
          echo "Found app at: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/HomeSector.zip" "$(basename "$APP_PATH")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HomeSector-Simulator
          path: HomeSector.zip
          retention-days: 7
