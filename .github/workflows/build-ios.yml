name: Build iOS Simulator App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build for simulator
        run: |
          xcodebuild \
            -project ios/ShopifyBulgarianMobileApp.xcodeproj \
            -scheme ShopifyBulgarianMobileApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            build

      - name: Package .app for Appetize
        run: |
          # Find the .app bundle
          APP_PATH=$(find build/Build/Products -name "*.app" -not -path "*/Tests*" | head -1)
          echo "Found app at: $APP_PATH"
          
          # Create a clean temp directory
          mkdir -p /tmp/appetize_upload
          
          # Copy .app directly into temp dir (no subdirectories)
          cp -r "$APP_PATH" /tmp/appetize_upload/
          
          # Zip from inside the temp dir so .app is at root of zip
          cd /tmp/appetize_upload
          zip -r "$GITHUB_WORKSPACE/HomeSector.zip" *.app
          
          # Verify structure
          echo "Zip contents:"
          unzip -l "$GITHUB_WORKSPACE/HomeSector.zip" | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HomeSector-Simulator
          path: HomeSector.zip
          retention-days: 7
