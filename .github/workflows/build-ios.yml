name: Build iOS Simulator App
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Fix nonisolated modifier
        run: |
          find ios -name "*.swift" -exec sed -i '' 's/nonisolated struct /struct /g' {} \;
          find ios -name "*.swift" -exec sed -i '' 's/nonisolated enum /enum /g' {} \;
          find ios -name "*.swift" -exec sed -i '' 's/nonisolated final class /final class /g' {} \;
          find ios -name "*.swift" -exec sed -i '' 's/nonisolated class /class /g' {} \;

      - name: Show available runtimes
        run: xcrun simctl list runtimes

      - name: Install iOS 18 runtime
        run: |
          sudo xcodebuild -runFirstLaunch
          xcrun simctl runtime add com.apple.CoreSimulator.SimRuntime.iOS-18-2 2>/dev/null || true
          xcodebuild -downloadPlatform iOS -quiet 2>/dev/null || true
          xcrun simctl list runtimes

      - name: Create simulator
        run: |
          RUNTIME=$(xcrun simctl list runtimes | grep "iOS 18" | head -1 | grep -oE "com\.apple\.CoreSimulator\.SimRuntime\.iOS-[0-9-]+" | head -1)
          echo "Runtime: $RUNTIME"
          if [ -z "$RUNTIME" ]; then
            echo "No iOS 18 runtime found, trying available runtime"
            RUNTIME=$(xcrun simctl list runtimes | grep -oE "com\.apple\.CoreSimulator\.SimRuntime\.iOS-[0-9-]+" | head -1)
            echo "Fallback runtime: $RUNTIME"
          fi
          DEVICE_ID=$(xcrun simctl create "BuildPhone" "iPhone 16" "$RUNTIME" 2>/dev/null || xcrun simctl create "BuildPhone" "iPhone 15" "$RUNTIME")
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV
          xcrun simctl boot "$DEVICE_ID" || true

      - name: Build for simulator
        run: |
          xcodebuild \
            -project ios/ShopifyBulgarianMobileApp.xcodeproj \
            -scheme ShopifyBulgarianMobileApp \
            -configuration Debug \
            -destination "id=$DEVICE_ID" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_SUPPRESS_WARNINGS=YES \
            ENABLE_DEBUG_DYLIB=NO \
            build

      - name: Package .app for Appetize
        run: |
          APP_PATH=$(find build/Build/Products -name "*.app" -not -path "*/Tests*" | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p /tmp/appetize
          cp -r "$APP_PATH" /tmp/appetize/
          cd /tmp/appetize
          zip -r "$GITHUB_WORKSPACE/HomeSector.zip" *.app
          echo "Zip contents:"
          unzip -l "$GITHUB_WORKSPACE/HomeSector.zip" | head -5

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HomeSector-Simulator
          path: HomeSector.zip
          retention-days: 7
